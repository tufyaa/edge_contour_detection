name: ci

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.1.0
      - name: Install Python
        run: uv python install ${{ matrix.python-version }}
      - name: Sync dependencies
        run: uv sync --locked --all-groups
      - name: Run quality checks, tests, docs and build
        run: uv run poe ci
